<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NarDialPy Screen</title>
  <link rel="stylesheet" href="/static/screen.css">
</head>
<body>
  <!--
    Layout — three overlapping full-viewport zones:

    1. #display-area  — background media (image / video / iframe / html / black)
    2. #transcript    — scrollable conversation log, overlaid at the bottom
    3. #input-area    — buttons or text input, overlaid above the transcript strip
  -->

  <div id="display-area"></div>

  <div id="transcript" class="hidden"></div>

  <div id="input-area" class="hidden"></div>

  <!--
    Socket.IO v4 client bundled with NarDialPy's static files.
    python-socketio v5 (EIO=4) requires a v4+ JS client; it does NOT serve
    one at /socket.io/socket.io.js, so we ship the file ourselves.
  -->
  <script src="/static/socket.io.min.js"></script>
  <script src="/static/screen.js"></script>
</body>
</html>
